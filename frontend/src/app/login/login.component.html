<div class="login-page d-flex align-items-center justify-content-center">
  <div class="card shadow border-0" style="width: 420px;">
    <div class="card-header bg-dark text-white text-center py-4">
      <i class="bi bi-book-half fs-1 text-warning"></i>
      <h3 class="mb-0 mt-2">Recette Mexicaine</h3>
      <small class="text-muted">Espace Administrateur</small>
    </div>
    <div class="card-body p-4">
      <form [formGroup]="formLogin" (ngSubmit)="submit()">

        <div class="mb-3">
          <label class="form-label fw-semibold">
            <i class="bi bi-envelope me-1"></i> Email
          </label>
          <input formControlName="email" type="email" class="form-control"
            placeholder="Entrez votre email"
            [ngClass]="{ 'is-invalid': submitted && formLogin.get('email')?.invalid }">
          <div class="invalid-feedback">Email invalide.</div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">
            <i class="bi bi-lock me-1"></i> Mot de passe
          </label>
          <input formControlName="password" type="password" class="form-control"
            placeholder="••••••••"
            [ngClass]="{ 'is-invalid': submitted && formLogin.get('password')?.invalid }">
          <div class="invalid-feedback">Mot de passe obligatoire.</div>
        </div>

        <button type="submit" class="btn btn-warning w-100 py-2">
          <i class="bi bi-box-arrow-in-right me-2"></i> Se connecter
        </button>

      </form>
    </div>
  </div>
</div>
