<div class="container mt-4" style="max-width: 500px;">
  <div class="card shadow-sm border-0">
    <div class="card-header bg-dark text-white">
      <h4 class="mb-0">Nouvelle catégorie</h4>
    </div>
    <div class="card-body">
      <form [formGroup]="formCategorie" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Nom *</label>
          <input formControlName="nom" type="text" class="form-control"
            placeholder="Ex : Plats principaux"
            [ngClass]="{ 'is-invalid': submitted && formCategorie.get('nom')?.invalid }">
          <div class="invalid-feedback">Le nom est obligatoire.</div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Description</label>
          <textarea formControlName="description" class="form-control" rows="3"
            placeholder="Description de la catégorie..."></textarea>
        </div>
        <div class="d-flex gap-2 justify-content-end">
          <button routerLink="/categories" type="button" class="btn btn-outline-secondary">Annuler</button>
          <button type="submit" class="btn btn-dark"> Enregistrer</button>
        </div>
      </form>
    </div>
  </div>
</div>
