<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-dark mb-0">
      <i class="bi bi-list-ul me-2 text-warning"></i>Gestion des Recettes
    </h2>
    <span class="badge bg-dark fs-6">{{ recettesFiltrees.length }} recette(s)</span>
  </div>

  
  <div class="row g-2 mb-4">
    <div class="col-md-5">
      <div class="input-group">
        <span class="input-group-text bg-white border-end-0">
          <i class="bi bi-search text-muted"></i>
        </span>
        <input
          type="text"
          class="form-control border-start-0"
          placeholder="Rechercher par nom..."
          [(ngModel)]="recherche"
          (ngModelChange)="filtrer()"
        />
      </div>
    </div>
    <div class="col-md-3">
      <select class="form-select"
              [(ngModel)]="categorieFiltre"
              (ngModelChange)="filtrer()">
        <option value="">Toutes les catégories</option>
        <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.nom }}</option>
      </select>
    </div>
    <div class="col-md-3">
      <select class="form-select"
              [(ngModel)]="difficulteFiltre"
              (ngModelChange)="filtrer()">
        <option value="">Toutes difficultés</option>
        <option value="Facile">Facile</option>
        <option value="Moyen">Moyen</option>
        <option value="Difficile">Difficile</option>
      </select>
    </div>
    <div class="col-md-1">
      <button class="btn btn-outline-secondary w-100" (click)="resetFiltres()">
        <i class="bi bi-x-circle"></i>
      </button>
    </div>
  </div>

  
  <div class="card shadow-sm border-0">
    <div class="card-body p-0 table-responsive">
      <table class="table table-hover table-striped mb-0">
        <thead class="table-dark">
          <tr>
            <th><i class="bi bi-card-text me-1"></i>Nom</th>
            <th><i class="bi bi-tag me-1"></i>Catégorie</th>
            <th><i class="bi bi-clock me-1"></i>Durée</th>
            <th><i class="bi bi-bar-chart me-1"></i>Difficulté</th>
            <th><i class="bi bi-gear me-1"></i>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let recette of recettesFiltrees">
            <td class="fw-semibold">{{ recette.nom }}</td>
            <td>
              <span class="badge bg-info text-dark">
                {{ getCategorieNom(recette.categorie) }}
              </span>
            </td>
            <td>{{ recette.duree }} min</td>
            <td>
              <span class="badge"
                [ngClass]="{
                  'bg-success':           recette.difficulte === 'Facile',
                  'bg-warning text-dark': recette.difficulte === 'Moyen',
                  'bg-danger':            recette.difficulte === 'Difficile'
                }">
                {{ recette.difficulte }}
              </span>
            </td>
            <td>
              <a [routerLink]="['/detail', recette.id]"
                 class="btn btn-sm btn-outline-info me-1">
                <i class="bi bi-eye"></i>
              </a>
              <a [routerLink]="['/edit', recette.id]"
                 class="btn btn-sm btn-outline-warning me-1">
                <i class="bi bi-pencil"></i>
              </a>
              <button (click)="deleteRecette(recette)"
                      class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
          <tr *ngIf="recettesFiltrees.length === 0">
            <td colspan="5" class="text-center text-muted py-4">
              <i class="bi bi-inbox me-2"></i>Aucune recette trouvée.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
